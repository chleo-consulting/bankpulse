services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bankpulse
      POSTGRES_PASSWORD: bankpulse
      POSTGRES_DB: bankpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankpulse -d bankpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bankpulse
      POSTGRES_PASSWORD: bankpulse
      POSTGRES_DB: bankpulse_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankpulse -d bankpulse_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app

  migrate:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: ["uv", "run", "alembic", "upgrade", "head"]
    profiles:
      - migrate

volumes:
  postgres_data:
